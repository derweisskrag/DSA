name: Publish to TestPyPI

on:
  push:
    branches: [main]  # or 'release' or 'publish' depending on your strategy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin twine

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build with Maturin
        run: |
          # We use the 'build' command directly. 
          # --release optimizes the Rust code.
          # --manylinux 2014 fixes the platform tag.
          maturin build --release --manylinux 2014 --interpreter python3

      - name: Publish to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.KUUKING_DSA_TOKEN }}
        run: |
          twine upload --repository-url https://test.pypi.org/legacy/ dist/*.whl --verbose
