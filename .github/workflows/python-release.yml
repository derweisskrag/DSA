name: Release to PyPI

on:
  push:
    tags:
      - 'v*' # Trigger only when you push a tag like v0.1.3

jobs:
  build_wheels:
    runs-on: ubuntu-latest # eventually need a matrix for Windows/Mac
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and Publish
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.BURMESE_NATIVE }}
        with:
          command: publish
          args: --release --interpreter python3
          # Point to your specific manifest
          manifest-path: rust_queue/Cargo.toml